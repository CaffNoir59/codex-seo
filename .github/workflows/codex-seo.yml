name: Codex SEO

on:
  workflow_dispatch:
    inputs:
      url:
        description: URL to audit
        required: true
        type: string
  schedule:
    - cron: "0 5 * * 1"

jobs:
  audit:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 22, 24]
    env:
      CODEX_SEO_URL: ${{ inputs.url || vars.CODEX_SEO_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: License audit
        run: npm run check:licenses
      - name: Sensitive content
        run: npm run check:sensitive
      - name: Build
        run: npm run build
      - name: Doctor
        run: node dist/cli/index.js doctor --json
      - name: Audit
        run: node dist/cli/index.js audit "$env:CODEX_SEO_URL" --crawl --save-history --environment production
        shell: pwsh
      - name: Historical gates
        run: node dist/cli/index.js history export-ci --format github
      - name: JUnit
        if: always()
        run: node dist/cli/index.js history export-ci --format junit
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codex-seo-reports-${{ matrix.os }}-node${{ matrix.node }}
          path: |
            reports/**
            .codex-seo/history/trends/**
